<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0;
    padding: 8px;
    background: #2b2b2b;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
  }
  #placeholder {
    color: #888;
    font-style: italic;
    padding: 16px 8px;
  }
  #diagram { text-align: center; }
  #diagram svg { max-width: 100%; height: auto; }
  #error {
    color: #ff6b6b;
    white-space: pre-wrap;
    font-family: Menlo, Consolas, monospace;
    font-size: 12px;
  }
</style>
</head>
<body>
  <div id="placeholder">No diagram yet — paste an analysis and click Generate.</div>
  <div id="diagram"></div>
  <div id="error"></div>

<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: false,
    theme: "dark",
    securityLevel: "loose",
    flowchart: { useMaxWidth: true }
  });

  window.renderMermaid = async function(code) {
    const placeholder = document.getElementById("placeholder");
    const diagram = document.getElementById("diagram");
    const error = document.getElementById("error");
    placeholder.style.display = "none";
    error.textContent = "";
    diagram.innerHTML = "";
    try {
      const { svg } = await mermaid.render("scopecreep-diagram", code);
      diagram.innerHTML = svg;
    } catch (e) {
      error.textContent = "Mermaid render error:\n" + (e && e.message ? e.message : e);
    }
  };
</script>
</body>
</html>
